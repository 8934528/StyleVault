version: '3.8'

services:
  db:
    image: postgres:16
    container_name: stylevault-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 8934528
      POSTGRES_DB: stylevault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stylevault-api
    ports:
      - "5242:80"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=stylevault
      - DB_USER=postgres
      - DB_PASSWORD=8934528
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stylevault-web
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
